---
name: BluebirdATC linting and tests

on: 
  pull_request:
    branches:
      - "main"
      - "dev"

jobs:
  ubuntu-tests:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          - ubuntu-latest
        python-version:
          - "3.10"
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Install uv and set python version
        uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up cache
        uses: actions/cache@v4
        id: cache
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('**/uv.lock') }}-${{ hashFiles('**/pyproject.toml') }}

      - name: Display Python version
        run: uv run python -c "import sys; print(sys.version)"

      - name: Check linting for bluebird-dt
        working-directory: ./bluebird-dt/bluebird_dt
        run: |
          for dir in ./core/ \
                     ./utility/ ; do
            uv run ruff check --output-format=github $dir
          done

      - name: Check formatting for bluebird-dt
        working-directory: ./bluebird-dt/bluebird_dt
        run: |
          for dir in ./core/ \
                     ./utility/ ; do
            uv run ruff format --check --diff $dir
          done

      - name: Check testing
        run: |
          uv run pytest -n auto
