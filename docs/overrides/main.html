{% extends "base.html" %}

{% block content %}
  {% if page.nb_url %}
    <div class="admonition note">
      <p class="admonition-title">
        Note
      </p>
      <p>
        Click <a href="{{ page.nb_url }}" title="Download Notebook">here</a>
        to download this notebook and run this example.
      </p>
    </div>
    <a href="{{ page.nb_url }}" title="Download Notebook" class="md-content__button md-icon">
        {% include ".icons/material/download.svg" %}
    </a>
  {% endif %}

  {{ super() }}
{% endblock content %}
